<title>스위스 11박12일</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#F5F3EE;--card:#fff;--ink:#232B27;--mut:#8A938B;--line:#E6E1D6;--accent:#2E7D54}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  line-height:1.5;padding-bottom:74px;max-width:640px;margin:0 auto;-webkit-font-smoothing:antialiased}
.top{position:sticky;top:0;z-index:20;background:rgba(245,243,238,.92);backdrop-filter:blur(8px);
  padding:14px 16px 10px;border-bottom:1px solid var(--line)}
.top h1{font-size:17px;font-weight:800;letter-spacing:-.01em}
.top .sub{font-size:12px;color:var(--mut);font-weight:600;margin-top:1px}
.wrap{padding:14px 16px 20px}
.hide{display:none}

/* day pills */
.pills{display:flex;gap:7px;overflow-x:auto;padding:12px 16px 6px;scrollbar-width:none;position:sticky;top:53px;z-index:15;
  background:rgba(245,243,238,.92);backdrop-filter:blur(8px)}
.pills::-webkit-scrollbar{display:none}
.pill{flex:0 0 auto;padding:7px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);
  font-size:13px;font-weight:700;color:#5a645c;display:flex;flex-direction:column;align-items:center;min-width:52px;line-height:1.15}
.pill small{font-size:10px;color:var(--mut);font-weight:600}
.pill.on{color:#fff;border-color:transparent}
.pill.today{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--accent)}

/* day head */
.dhead{display:flex;align-items:center;gap:9px;margin:4px 0 12px}
.dbadge{color:#fff;font-weight:800;font-size:15px;border-radius:8px;padding:4px 11px}
.dhead .dt{font-weight:800;font-size:16px}
.dhead .rg{margin-left:auto;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:700}
.dtitle{font-size:15px;font-weight:800;color:#333;margin:-6px 0 14px}

/* timeline */
.row{display:flex;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.row:first-child{border-top:none}
.rt{flex:0 0 52px;font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}
.rc{flex:1}
.ra{font-size:14.5px;font-weight:600}
.rn{font-size:12.5px;color:var(--mut);margin-top:2px}
.rmap{flex:0 0 auto;align-self:center;width:36px;height:36px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;background:#f0ede4;text-decoration:none;margin-left:4px}
.rmap:active{background:#e4dfd2}
.rmap svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.row.next{background:#fff;border-radius:12px;padding:11px 12px;border:none;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.nexttag{display:inline-block;font-size:10px;font-weight:800;color:#fff;border-radius:5px;padding:1px 6px;margin-bottom:3px}

/* checklist */
.prog{height:8px;background:#e6e1d6;border-radius:99px;overflow:hidden;margin:2px 0 16px}
.prog>i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.cgrp{font-size:12px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 7px}
.citem{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid var(--line);
  border-radius:12px;padding:12px 13px;margin-bottom:8px;cursor:pointer}
.cbox{flex:0 0 22px;height:22px;border:2px solid #cfd6cf;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:14px;color:#fff;transition:.15s;margin-top:1px}
.citem.done .cbox{background:var(--accent);border-color:var(--accent)}
.citem.done .ctext{color:var(--mut);text-decoration:line-through}
.ctext{font-size:14px;font-weight:600}

/* cost */
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px 14px;margin-bottom:14px}
.crow{display:flex;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--line);font-size:14px}
.crow:first-child{border-top:none}
.crow .l{font-weight:600}.crow .l small{color:var(--mut);font-weight:600;font-size:12px}
.crow .v{font-weight:800;white-space:nowrap}
.crow.tot{border-top:2px solid var(--ink)}
.crow.tot .v{color:var(--accent)}
.done-badge{font-size:10px;color:#2E7D54;font-weight:800;background:#e7f1ea;border-radius:5px;padding:1px 6px;margin-left:6px}
.sec{font-size:13px;font-weight:800;margin:4px 2px 8px;color:#333}
.conv{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:14px;font-size:14px}
.conv input{width:70px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:14px;font-weight:700;text-align:right}
.conv .eq{font-weight:800;color:var(--accent);margin-left:auto}

/* tips */
.tipcommon{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:16px}
.linkcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:16px}
.linkrow{display:flex;align-items:center;gap:10px;padding:13px 14px;border-top:1px solid var(--line);text-decoration:none;color:var(--ink)}
.linkrow:first-child{border-top:none}
.linkrow:active{background:#f5f3ee}
.linkrow .lt{flex:1;min-width:0}
.linkrow .ln{font-size:14px;font-weight:700}
.linkrow .lu{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.linkrow .go{color:var(--mut);flex:0 0 auto}
.tipcommon .t{font-size:13px;padding:5px 0}
.acc{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden}
.acc>summary{list-style:none;padding:13px 14px;font-weight:800;font-size:14px;display:flex;align-items:center;gap:9px;cursor:pointer}
.acc>summary::-webkit-details-marker{display:none}
.acc[open]>summary{border-bottom:1px solid var(--line)}
.acc .body{padding:12px 14px;font-size:13.5px}
.acc .body p{padding:4px 0}
.mini{color:#fff;font-weight:800;font-size:12px;border-radius:6px;padding:2px 8px}
.chev{margin-left:auto;color:var(--mut);transition:.2s}
.acc[open] .chev{transform:rotate(180deg)}

/* expense */
.exp-sum{background:var(--accent);color:#fff;border-radius:16px;padding:15px 18px;margin-bottom:14px}
.exp-sum .big{font-size:27px;font-weight:800;letter-spacing:-.01em}
.exp-sum .sm{font-size:12.5px;opacity:.88;margin-top:2px}
.addbox{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:11px}
.amtrow{display:flex;gap:8px;margin-bottom:10px}
.amtrow input.amt{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:18px;font-weight:800;text-align:right;-webkit-appearance:none}
.curbtn{border:1.5px solid var(--line);background:#f0ede4;border-radius:10px;padding:0 15px;font-weight:800;font-size:14px;cursor:pointer}
.curbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.catpill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 11px;font-size:13px;font-weight:700;cursor:pointer;color:#5a645c}
.exprow2{display:flex;gap:8px;margin-bottom:10px}
.exprow2 select{flex:0 0 auto;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;background:#fff}
.exprow2 input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px}
.addbtn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer}
.presets{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.presets::-webkit-scrollbar{display:none}
.preset{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.vtabs{display:flex;gap:6px;margin-bottom:12px}
.vtab{flex:1;text-align:center;padding:9px;border-radius:9px;background:#fff;border:1px solid var(--line);font-size:13px;font-weight:700;color:#5a645c;cursor:pointer}
.vtab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.ei{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:7px}
.ei .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
.ei .ec{flex:1;min-width:0}.ei .en{font-size:14px;font-weight:600}.ei .em{font-size:11.5px;color:var(--mut)}
.ei .ev{font-weight:800;font-size:14px;white-space:nowrap}
.ei .del{color:#c1352b;font-weight:800;padding:2px 4px 2px 8px;cursor:pointer;font-size:17px}
.dh{display:flex;justify-content:space-between;font-weight:800;font-size:13px;margin:16px 2px 8px;color:#333}
.barrow{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.barrow .bl{flex:0 0 90px;font-size:13px;font-weight:700}
.bar{flex:1;height:15px;background:#ece8de;border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:99px}
.barrow .bv{flex:0 0 auto;font-size:12px;font-weight:800;color:#555;min-width:96px;text-align:right}
.donut{display:block;margin:4px auto 16px}
.empty{text-align:center;color:var(--mut);font-size:13.5px;padding:30px 0}
.expexport{width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;color:#333}

/* tabbar */
.tabbar{position:fixed;bottom:0;left:0;right:0;max-width:640px;margin:0 auto;background:rgba(255,255,255,.96);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;padding:6px 4px 10px;z-index:30}
.tab{flex:1;background:none;border:none;padding:6px 0;display:flex;flex-direction:column;align-items:center;gap:2px;
  color:var(--mut);font-size:11px;font-weight:700;cursor:pointer}
.tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab.on{color:var(--accent)}
.foot{text-align:center;font-size:11px;color:var(--mut);padding:18px 10px 6px;line-height:1.6}
</style>
</head>

/* storage (safe for sandbox) */

/* pills + day */
function renderPills(){
 const box=el("pills");box.innerHTML="";
 DAYS.forEach((d,i)=>{
  const b=document.createElement("div");
  b.className="pill"+(i===curDay?" on":"")+(d.iso===todayISO()?" today":"");
  if(i===curDay)b.style.background=RC[d.region];
  b.innerHTML=`${d.id}<small ${i===curDay?'style="color:rgba(255,255,255,.8)"':''}>${d.date}</small>`;
  b.onclick=()=>{curDay=i;renderPills();renderDay();window.scrollTo(0,0)};
  box.appendChild(b);
 });
}
function renderDay(){
 const d=DAYS[curDay],c=RC[d.region];
 const now=nowMin(),isToday=d.iso===todayISO();
 let nextIdx=-1;
 if(isToday){for(let i=0;i<d.items.length;i++){if(toMin(d.items[i][0])>=now){nextIdx=i;break}}}
 let h=`<div class="dhead"><span class="dbadge" style="background:${c}">${d.id}</span>
   <span class="dt">${d.date} <small style="color:var(--mut);font-weight:600">${d.dow}</small></span>
   <span class="rg">${d.region}</span></div><div class="dtitle">${d.title}</div>`;
 d.items.forEach((it,i)=>{
  const nx=i===nextIdx;const q=MAPS[it[1]];
  const mp=q?`<a class="rmap" style="color:${c}" target="_blank" rel="noopener" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(q)}" aria-label="길찾기"><svg viewBox="0 0 24 24"><path d="M12 21s-7-6.3-7-11a7 7 0 0114 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></a>`:'';
  h+=`<div class="row${nx?' next':''}"><div class="rt" style="color:${c}">${it[0]}</div>
    <div class="rc">${nx?`<span class="nexttag" style="background:${c}">다음 일정</span><br>`:''}<div class="ra">${it[1]}</div>${it[2]?`<div class="rn">${it[2]}</div>`:''}</div>${mp}</div>`;
 });
 el("dayview").innerHTML=h;
 document.documentElement.style.setProperty('--accent',c);
}

/* checklist */
function renderCheck(){
 const saved=S.get("swiss_check")||{};let done=0,total=0;
 let h="";
 CHECK.forEach(g=>{
  h+=`<div class="cgrp">${g[0]}</div>`;
  g[1].forEach(t=>{
   total++;const on=!!saved[t];if(on)done++;
   h+=`<div class="citem${on?' done':''}" data-k="${t.replace(/"/g,'')}">
     <div class="cbox">✓</div><div class="ctext">${t}</div></div>`;
  });
 });
 el("checklist").innerHTML=h;
 el("progbar").style.width=total?Math.round(done/total*100)+"%":"0";
 document.querySelectorAll(".citem").forEach(it=>{
  it.onclick=()=>{const s=S.get("swiss_check")||{};const k=it.getAttribute("data-k");
   s[k]=!s[k];S.set("swiss_check",s);renderCheck();};
 });
}

/* cost */
function money(list,dr){return list.map(r=>`<div class="crow${r[0].includes('합계')?' tot':''}">
  <div class="l">${r[0]}${r[1]?` <small>${r[1]}</small>`:''}${(dr&&r[3])?' <span class="done-badge">완료</span>':''}</div>
  <div class="v">${r[dr?2:2]}</div></div>`).join("")}
function renderCost(){
 el("costview").innerHTML=`
  <div class="sec">🎫 패스</div><div class="card">${money(COST.passes,true)}</div>
  <div class="sec">🚆 교통 티켓</div><div class="card">${money(COST.tickets,true)}</div>
  <div class="sec">🏨 숙소</div><div class="card">${money(COST.stay,false)}</div>
  <div class="sec">💵 현지 결제 (당일)</div><div class="card">${money(COST.onsite,false)}</div>
  <div class="sec">✈️ 항공</div><div class="card"><div class="crow"><div class="l">왕복</div><div class="v">${COST.flight.replace('2인 왕복 ','')}</div></div></div>
  <div class="sec">🔁 환율 계산기</div>
  <div class="conv">CHF <input id="chf" type="number" value="100" inputmode="decimal">
   × <input id="rate" type="number" value="1850" inputmode="decimal">
   <span class="eq" id="krw">185,000원</span></div>
  <div class="conv">¥ <input id="cny" type="number" value="100" inputmode="decimal">
   × <input id="cnyrate" type="number" value="220" inputmode="decimal">
   <span class="eq" id="cnykrw">22,000원</span></div>`;
 const calc=()=>{const r=+el("rate").value||1850;S.set("swiss_rate",r);
  el("krw").textContent=Math.round((+el("chf").value||0)*r).toLocaleString()+"원";};
 const calc2=()=>{const r=+el("cnyrate").value||220;S.set("swiss_cny",r);
  el("cnykrw").textContent=Math.round((+el("cny").value||0)*r).toLocaleString()+"원";};
 el("chf").oninput=calc;el("rate").oninput=calc;el("cny").oninput=calc2;el("cnyrate").oninput=calc2;
}

/* tips */
function renderTip(){
 let h=`<div class="sec">🔗 링크 모음</div><div class="linkcard">`+
  LINKS.map(l=>{const dom=l[1].replace(/^https?:\/\//,'').split('/')[0];
   return `<a class="linkrow" href="${l[1]}" target="_blank" rel="noopener"><div class="lt"><div class="ln">${l[0]}</div><div class="lu">${dom}</div></div><svg class="go" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg></a>`;}).join("")+`</div>`;
 h+=`<div class="sec">🧭 공통</div><div class="tipcommon">`+
  COMMON.map(t=>`<div class="t">· ${t}</div>`).join("")+`</div><div class="sec">📅 날짜별</div>`;
 DAYS.forEach(d=>{
  if(!d.warn&&!d.tip)return;
  h+=`<details class="acc"><summary><span class="mini" style="background:${RC[d.region]}">${d.id}</span>${d.date} ${d.title.split(' · ')[0]}<span class="chev">▾</span></summary>
    <div class="body">${d.warn?`<p>⚠️ ${d.warn}</p>`:''}${d.tip?`<p>💡 ${d.tip}</p>`:''}</div></details>`;
 });
 el("tipview").innerHTML=h;
}

/* date helpers */
function todayISO(){const t=new Date();return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0")}
function nowMin(){const t=new Date();return t.getHours()*60+t.getMinutes()}
function toMin(s){const[a,b]=s.split(":");return(+a)*60+(+b)}

/* tabs */
document.querySelectorAll(".tab").forEach(t=>{
 t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));t.classList.add("on");
  const v=t.getAttribute("data-v");
  ["day","exp","check","cost","tip"].forEach(k=>el("v-"+k).classList.toggle("hide",k!==v));
  if(v!=="day")document.documentElement.style.setProperty('--accent','#2E7D54');else renderDay();
  if(v==="check")renderCheck();if(v==="cost")renderCost();if(v==="tip")renderTip();if(v==="exp")renderExp();
  window.scrollTo(0,0);
 };
});

/* ===== 가계부 ===== */
const CATS=[["식비","🍴","#E8552D"],["교통","🚡","#3A6E8F"],["입장·액티비티","🎫","#2E7D54"],
 ["쇼핑","🛍️","#B9791F"],["간식","☕","#9B6A4A"],["숙소","🏨","#5A5168"],["기타","🔖","#8A938B"]];
const PRESETS=[];
let expForm={cur:"CHF",cat:"식비"},expView="cat";
const getExp=()=>S.get("swiss_exp")||[];
const setExp=a=>S.set("swiss_exp",a);
const getRate=()=>S.get("swiss_rate")||1850;
const getCny=()=>S.get("swiss_cny")||220;
const catMeta=n=>CATS.find(c=>c[0]===n)||CATS[6];
const toCHF=(e,r)=>e.cur==="CHF"?e.amt:(e.cur==="CNY"?e.amt*getCny()/r:e.amt/r);

function renderExp(){
 const exp=getExp(),rate=getRate();
 const tot=exp.reduce((s,e)=>s+toCHF(e,rate),0);
 let h=`<div class="exp-sum"><div class="sm">총 지출 · ${exp.length}건</div>
   <div class="big">${Math.round(tot*rate).toLocaleString()}원</div>
   <div class="sm">≈ CHF ${tot.toFixed(2)} · 환율 ${rate}</div></div>
  <div class="addbox">
   <div class="amtrow"><input class="amt" id="eamt" type="number" inputmode="decimal" placeholder="금액">
     <button class="curbtn on" id="curtoggle">${expForm.cur}</button></div>
   <div class="cats" id="ecats"></div>
   <div class="exprow2"><select id="eday"></select><input id="ememo" placeholder="메모 (선택)"></div>
   <button class="addbtn" id="eadd">+ 추가</button></div>
  ${PRESETS.length?'<div class="presets" id="epresets"></div>':''}
  <div class="vtabs">
   <div class="vtab" data-ev="cat">카테고리</div><div class="vtab" data-ev="day">날짜별</div><div class="vtab" data-ev="list">목록</div></div>
  <div id="expbody"></div>
  <button class="expexport" id="ecsv">📋 CSV 복사 · 내보내기</button>`;
 el("expview").innerHTML=h;
 syncCat();syncCur();
 el("eday").innerHTML=`<option value="">날짜(선택)</option>`+DAYS.map(d=>`<option value="${d.id}">${d.id} · ${d.date}</option>`).join("");
 if(PRESETS.length)el("epresets").innerHTML=PRESETS.map((p,i)=>`<span class="preset" data-p="${i}">${catMeta(p[1])[1]} ${p[0]}${p[2]?` ${p[2]}`:''}</span>`).join("");
 document.querySelectorAll(".vtab").forEach(v=>{v.classList.toggle("on",v.dataset.ev===expView);
   v.onclick=()=>{expView=v.dataset.ev;document.querySelectorAll(".vtab").forEach(x=>x.classList.toggle("on",x===v));renderBody()};});
 el("curtoggle").onclick=()=>{expForm.cur=expForm.cur==="CHF"?"₩":(expForm.cur==="₩"?"¥":"CHF");syncCur()};
 el("eadd").onclick=addExp;
 el("ecsv").onclick=expCSV;
 if(PRESETS.length)document.querySelectorAll("#epresets .preset").forEach(p=>p.onclick=()=>{
   const pr=PRESETS[+p.dataset.p];expForm.cat=pr[1];syncCat();
   if(pr[2]){el("eamt").value=pr[2];}el("eamt").focus();});
 renderBody();
}
function syncCat(){el("ecats").innerHTML=CATS.map(c=>{const on=expForm.cat===c[0];
   return `<span class="catpill" data-cat="${c[0]}" style="${on?`background:${c[2]};color:#fff;border-color:${c[2]}`:''}">${c[1]} ${c[0]}</span>`;}).join("");
 document.querySelectorAll("#ecats .catpill").forEach(p=>p.onclick=()=>{expForm.cat=p.dataset.cat;syncCat()});}
function syncCur(){const b=el("curtoggle");b.textContent=expForm.cur;}
function addExp(){
 const amt=parseFloat(el("eamt").value);if(!amt||amt<=0){el("eamt").focus();return;}
 const exp=getExp();
 exp.push({id:Date.now(),amt:amt,cur:expForm.cur==="₩"?"KRW":(expForm.cur==="¥"?"CNY":"CHF"),cat:expForm.cat,
   day:el("eday").value,memo:el("ememo").value.trim(),ts:Date.now()});
 setExp(exp);renderExp();
}
function delExp(id){const exp=getExp().filter(e=>e.id!==id);setExp(exp);renderExp();}
function fmt(e){if(e.cur==="CHF")return "CHF "+e.amt.toFixed(2);
 if(e.cur==="CNY")return "¥"+(e.amt%1?e.amt.toFixed(2):e.amt.toLocaleString());
 return "₩"+Math.round(e.amt).toLocaleString();}
function renderBody(){
 const exp=getExp(),rate=getRate(),body=el("expbody");
 if(!exp.length){body.innerHTML=`<div class="empty">아직 지출이 없어요.<br>위에서 금액·카테고리 골라 추가해 보세요 💸</div>`;return;}
 const tot=exp.reduce((s,e)=>s+toCHF(e,rate),0);
 if(expView==="cat"){
  const by={};CATS.forEach(c=>by[c[0]]=0);exp.forEach(e=>by[e.cat]=(by[e.cat]||0)+toCHF(e,rate));
  const parts=CATS.map(c=>({color:c[2],val:by[c[0]]})).filter(p=>p.val>0);
  let h=donut(parts,tot,rate);
  h+=CATS.filter(c=>by[c[0]]>0).sort((a,b)=>by[b[0]]-by[a[0]]).map(c=>{
    const v=by[c[0]],pct=tot?Math.round(v/tot*100):0;
    return `<div class="barrow"><div class="bl">${c[1]} ${c[0]}</div>
      <div class="bar"><i style="width:${pct}%;background:${c[2]}"></i></div>
      <div class="bv">${Math.round(v*rate).toLocaleString()}원 · ${pct}%</div></div>`;}).join("");
  body.innerHTML=h;
 } else if(expView==="day"){
  let h="";const order=DAYS.map(d=>d.id).concat([""]);
  order.forEach(did=>{
   const es=exp.filter(e=>e.day===did);if(!es.length)return;
   const sub=es.reduce((s,e)=>s+toCHF(e,rate),0);
   const d=DAYS.find(x=>x.id===did);
   h+=`<div class="dh"><span>${did?`${did} · ${d?d.date:''}`:'날짜 미지정'}</span><span>${Math.round(sub*rate).toLocaleString()}원</span></div>`;
   h+=es.map(rowHTML).join("");
  });
  body.innerHTML=h;
 } else {
  body.innerHTML=exp.slice().sort((a,b)=>b.ts-a.ts).map(rowHTML).join("");
 }
}
function rowHTML(e){const c=catMeta(e.cat);
 return `<div class="ei"><span class="dot" style="background:${c[2]}"></span>
  <div class="ec"><div class="en">${c[1]} ${e.memo||e.cat}</div>
   <div class="em">${e.day?e.day+' · ':''}${e.cat}</div></div>
  <div class="ev">${fmt(e)}</div><span class="del" onclick="delExp(${e.id})">×</span></div>`;}
function donut(parts,total,rate){
 const r=52,c=2*Math.PI*r,cx=70,cy=70;let off=0;
 const segs=parts.map(p=>{const len=total?p.val/total*c:0;
   const s=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${p.color}" stroke-width="20"
     stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;
   off+=len;return s;}).join("");
 return `<svg class="donut" width="140" height="140" viewBox="0 0 140 140">${segs}
   <text x="70" y="65" text-anchor="middle" font-size="11" fill="#8A938B">총 지출</text>
   <text x="70" y="84" text-anchor="middle" font-size="13" font-weight="800" fill="#232B27">${Math.round(total*rate).toLocaleString()}원</text></svg>`;
}
function expCSV(){
 const exp=getExp();if(!exp.length){alert("내보낼 지출이 없어요.");return;}
 const rows=[["날짜","항목","카테고리","통화","금액"]].concat(
   exp.slice().sort((a,b)=>a.ts-b.ts).map(e=>[e.day||"",e.memo||e.cat,e.cat,e.cur,e.amt]));
 const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
 try{navigator.clipboard&&navigator.clipboard.writeText(csv);}catch(e){}
 const a=document.createElement("a");
 a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);
 a.download="스위스_가계부.csv";document.body.appendChild(a);a.click();a.remove();
 alert("CSV를 클립보드에 복사하고 파일로 내려받았어요.");
}

/* init: jump to today if in range */
(function(){
 const ti=todayISO();const idx=DAYS.findIndex(d=>d.iso===ti);
 if(idx>=0)curDay=idx;
 renderPills();renderDay();
})();
</script>
